version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/001_init.sql"
      - "migrations/002_enhance.sql"
    queries: "queries/ota.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
